services:
  # 🐘 Core Database
  db:
    image: postgres:16-alpine
    container_name: heist-db
    environment:
      - POSTGRES_USER=heist_admin
      - POSTGRES_PASSWORD=heist_vault_pass
      - POSTGRES_DB=codeheist
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - heist-network

  # ⚡ PgBouncer (Connection Pooler)
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: heist-pooler
    ports:
      - "6432:6432"
    volumes:
      - ./backend/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini
      - ./backend/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt
    depends_on:
      - db
    networks:
      - heist-network

  # 🖥️ pgAdmin (Database GUI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: heist-admin
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@codeheist.com
      - PGADMIN_DEFAULT_PASSWORD=heist_admin_pass
    networks:
      - heist-network

  # 🚀 Your Backend
  backend:
    build: ./backend
    container_name: heist-backend
    ports:
      - "5000:5000"
    env_file: ./backend/.env
    depends_on:
      - pgbouncer
    networks:
      - heist-network

volumes:
  pgdata:

networks:
  heist-network:
    driver: bridge